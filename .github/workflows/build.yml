name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev build-essential libsqlite3-dev ccache
          pip install buildozer cython kivy
      - name: Create project files
        run: |
          mkdir -p www
          cp index.html www/
          cat > main.py << 'EOF'
          from kivy.app import App
          from kivy.uix.widget import Widget
          class NourishAIApp(App):
              def build(self):
                  return Widget()
          if __name__ == '__main__':
              NourishAIApp().run()
          EOF
          cat > buildozer.spec << 'EOF'
          [app]
          title = NourishAI
          package.name = nourishai
          package.domain = com.nourishai
          source.dir = .
          source.include_exts = py,html
          source.include_patterns = www/*.html
          version = 1.0
          requirements = python3,kivy,pyjnius,android
          orientation = portrait
          android.minapi = 26
          android.ndk = 25b
          android.accept_sdk_license = True
          android.arch = arm64-v8a
          android.permissions = INTERNET,CAMERA
          fullscreen = 0
          [buildozer]
          log_level = 2
          EOF
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: NourishAI-APK
          path: bin/*.apk
