name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install python-for-android
      - run: sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev build-essential
      - run: mkdir -p myapp && cp index.html myapp/
      - run: p4a apk --private myapp --package=com.nourishai.app --name=NourishAI --version=1.0 --bootstrap=webview --requirements=python3 --arch=armeabi-v7a --android-api 34
      - uses: actions/upload-artifact@v4
        with:
          name: NourishAI-APK
          path: "*.apk"
